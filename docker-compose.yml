services:
  postgres:
    image: postgres:15
    container_name: ai-stock-lab-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    image: python:3.11-slim
    container_name: ai-stock-lab-backend
    working_dir: /app
    command: >
      sh -c "pip install --no-cache-dir -r requirements.txt &&
      python manage.py migrate &&
      python manage.py import_sample_market_data &&
      python manage.py runserver 0.0.0.0:8000"
    env_file:
      - .env
    environment:
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED: "1"
    volumes:
      - ./backend:/app
      - ./data:/data:ro
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    image: node:20-alpine
    container_name: ai-stock-lab-frontend
    working_dir: /app
    user: "${UID:-1000}:${GID:-1000}"
    command: sh -c "npm install --no-package-lock && npm run dev -- --hostname 0.0.0.0"
    env_file:
      - .env
    environment:
      NPM_CONFIG_CACHE: /tmp/.npm
    volumes:
      - ./frontend:/app
    ports:
      - "3000:3000"
    depends_on:
      - backend

  ollama:
    image: ollama/ollama:latest
    container_name: ai-stock-lab-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

volumes:
  postgres_data:
  ollama_data:
