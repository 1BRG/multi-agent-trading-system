version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: ai-stock-lab-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    image: python:3.11-slim
    container_name: ai-stock-lab-backend
    working_dir: /app
    command: sh -c "echo 'TODO: configure backend container' && sleep infinity"
    env_file:
      - .env
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - ollama

  frontend:
    image: node:20-alpine
    container_name: ai-stock-lab-frontend
    working_dir: /app
    command: sh -c "echo 'TODO: configure frontend container' && sleep infinity"
    env_file:
      - .env
    volumes:
      - ./frontend:/app
    ports:
      - "3000:3000"
    depends_on:
      - backend

  ollama:
    image: ollama/ollama:latest
    container_name: ai-stock-lab-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

volumes:
  postgres_data:
  ollama_data:
