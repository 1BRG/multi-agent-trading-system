name: CI — Lint & Static Analysis

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  # ──────────────────────────────────────────────
  # Python backend — Ruff (linter + formatter check)
  # ──────────────────────────────────────────────
  backend-lint:
    name: Backend — Ruff
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Ruff lint
        run: ruff check .


  # ──────────────────────────────────────────────
  # Python backend — Django system checks
  # ──────────────────────────────────────────────
  backend-django-check:
    name: Backend — Django Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      DJANGO_SETTINGS_MODULE: config.settings
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ci_test

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ci_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Django system checks
        run: python manage.py check --fail-level ERROR

      - name: Run migrations
        run: python manage.py migrate

      - name: Check for missing migrations
        run: python manage.py makemigrations --check --dry-run

      - name: Run backend tests and agent evals
        run: python manage.py test accounts market strategies backtests conversations portfolios

  # ──────────────────────────────────────────────
  # Frontend — TypeScript + ESLint
  # ──────────────────────────────────────────────
  frontend-lint:
    name: Frontend — TypeScript & ESLint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --no-package-lock

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: ESLint
        run: npm run lint
